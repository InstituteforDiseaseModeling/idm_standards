site_name: IMD standards # update to your project name
site_url: https://InstituteforDiseaseModeling.github.io/idm_standards/ update to your project URL for the correct modeling framework
repo_name: InstituteforDiseaseModeling/idm_standards # update to your repo name
repo_url: https://github.com/InstituteforDiseaseModeling/idm_standards # update to your repo URL
docs_dir: docs_guidance # so we can include both eng_guidance and docs_guidance without nesting those folders
theme:
  name: material
  custom_dir: docs_guidance/customization/overrides
  font:
    text: Roboto
    code: Roboto Mono
  logo: images/idm-logo-transparent.png
  favicon: images/favicon.ico
  features:
    - navigation.footer # include a footer with links to privacy, terms, etc.
    - content.code.copy # enable copy buttons for code blocks
    - navigation.indexes # enable parent index page for sections
  palette:
    # Light Mode
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Light mode
      primary: white
      accent: light blue
    # Dark Mode
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Dark mode
      primary: black
      accent: light blue

nav:
  - Docs guidance:
    - Docs guidance: index.md
    - MkDocs overview: mkdocs.md
    - Quarto overview: quarto.md
    - Home: home.md
    - Installation: install.md
    - TOC organization and topic types:
      - topic-types/index.md
      - Tutorial: topic-types/tutorial.md
      - Example notebook: topic-types/notebook.ipynb
      - How-to: topic-types/howto.md
      - Reference: topic-types/reference.md
      - Explanation: topic-types/explanation.md
    - Personas:
      - personas/index.md
      - Model builder: personas/model-builder.md
      - Model extender: personas/model-extender.md
      - Model user: personas/model-user.md
      - Policy influencer: personas/policy-influencer.md
      - Policy maker: personas/policy-maker.md
  - Engineering guidance:
    - Philosophy: ../eng_guidance/1_philosophy.md
    - Python: ../eng_guidance/2_python.md
    - Tests: ../eng_guidance/3_tests.md
    - Documentation: ../eng_guidance/4_documentation.md
    - Other: ../eng_guidance/5_other.md
    - Zen: ../eng_guidance/6_zen.md

# icons, semantic markup, emojis 
markdown_extensions:
  - toc:
      toc_depth: 3
  - attr_list # enables HTMl and CSS classes to inline elements
  - md_in_html # enables grids
  - admonition # warnings, etc.
  - def_list
  - pymdownx.emoji: # emojis and icons
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.arithmatex: # Latex processing for math equations
      generic: true
  - pymdownx.snippets: # insert content from other files
      auto_append:
        - docs_guidance/includes/glossary.md # definitions for glossary entries
  - abbr # term/abbreviation hover descriptions
  - pymdownx.blocks.details: # allows nesting of collapsible code
  - pymdownx.highlight: # syntax highlighting for code blocks
      linenums: true
      default_lang: 'python'
  - pymdownx.inlinehilite # syntax highlighting for inline code
  - pymdownx.superfences # enables code, diagram fences to be nested in lists, etc.e
  - pymdownx.details # collapsible elements
  - pymdownx.tabbed: # tabbed content that can be toggled
      alternate_style: true
  - pymdownx.blocks.caption # captions for images, tables, etc.

# javascript and CSS customization
extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
extra_css:
  - customization/css/extra.css # custom CSS for footer spacing

plugins:
  - search # search functionality
  - autorefs # automatically create linkable references
  - include-markdown # include other files, such as READMEs
  - table-reader # enables rendering of CSV/TSV files as tables
  - mkdocs-jupyter: # enables Jupyter notebooks to be rendered
      execute: true
      allow_errors: false # set to true to continue executing cells even if one fails
      include_source: true

copyright: Copyright &copy; 2026 Gates Foundation. All rights reserved.

